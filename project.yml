name: SplitEasy
options:
  bundleIdPrefix: com.radimsoukal
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: true
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "0.1.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: N3Y8QAD24R

targets:
  SplitEasy:
    type: application
    platform: iOS
    sources:
      - path: SplitEasy
        excludes:
          - "Resources/Secrets.plist.example"
    resources:
      - path: SplitEasy/Resources/Assets.xcassets
      - path: SplitEasy/Resources/Secrets.plist
        optional: true
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        PRODUCT_BUNDLE_IDENTIFIER: com.radimsoukal.SplitEasy
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_CFBundleDisplayName: "SplitEasy"

  SplitEasyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SplitEasyTests
    dependencies:
      - target: SplitEasy
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/SplitEasy.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/SplitEasy"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  SplitEasy:
    build:
      targets:
        SplitEasy: all
        SplitEasyTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SplitEasyTests
